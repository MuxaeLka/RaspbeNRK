name: Build & Release RaspbeNRK

on:
  push:
    tags:
      - 'desktop-v*.*.*'
  workflow_dispatch:

# Явно даємо дозвіл на запис у репозиторій
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install PyQt6-WebEngine

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed `
            --icon=resources/icon.ico `
            --add-data "resources/icon.ico;." `
            --name "RaspbeNRK" `
            --collect-all PyQt6 `
            main.py

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "RaspbeNRK ${{ github.ref_name }}"
          body: |
            ## ${{ github.ref_name }}

            ### Встановлення
            1. Скачай `RaspbeNRK.exe`
            2. Поклади поруч `config.json` (або створюється автоматично)
            3. Запускай
          files: dist/RaspbeNRK.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
